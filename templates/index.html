<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Můj To-Do List</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 50px auto; text-align: center; }
        ul { list-style: none; padding: 0; }
        li { background: #eee; margin: 5px 0; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .completed { text-decoration: line-through; color: gray; }
        .task-text { cursor: pointer; flex-grow: 1; text-align: left; }
        .actions a { margin-left: 10px; text-decoration: none; font-weight: bold; }
        .delete { color: red; }
    </style>
</head>
<body>
    <h2>To-Do List</h2>
    <form action="/add" method="POST">
        <input type="text" name="task" placeholder="Co je třeba udělat?" required>
        <button type="submit">Přidat</button>
    </form>
    <ul>
        {% for task in tasks %}
            <li>
                <span class="task-text {{ 'completed' if task[2] == 1 }}" 
                      onclick="window.location.href='/done/{{ task[0] }}'">
                    {{ task[1] }}
                </span>
                <div class="actions">
                    <a href="/delete/{{ task[0] }}" class="delete">X</a>
                </div>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
